<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Used Cars</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Pak wheels</h1>

   <div class="car-section">

    <div class="car-card">
      <img src="car1.webp" alt="Car Image">
      <div class="car-info">
        <h3>Toyota Corolla 2015</h3>
        <p class="price">PKR 4,000,000</p>
        <p class="details">100,000 km • Petrol • Automatic</p>
      </div>
    </div>

    
    <div class="car-card">
      <img src="car 2.webp" alt="Car Image">
      <div class="car-info">
        <h3>Honda Civic 2018</h3>
        <p class="price">PKR 5,000,000</p>
        <p class="details">50,000 km • Petrol • Manual</p>
      </div>
    </div>

    
    <div class="car-card">
      <img src="car 3.webp" alt="Car Image">
      <div class="car-info">
        <h3>Suzuki Swift 2020</h3>
        <p class="price">PKR 2,500,000</p>
        <p class="details">30,000 km • Petrol • Automatic</p>
      </div>
    </div>
  </div>

</body>
</html>
